<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<!-- Prevent Safari/iOS from caching this shell. The .jsx files have their
     own query-string cache buster, but if index.html itself is stale the
     buster is moot because the new file list never loads. -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>PokeCollect</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  window._supabase = supabase.createClient(
    'https://nlqertwixldiekczprcp.supabase.co',
    'sb_publishable_Zn7c85lRi0DBREPKPDMcRw_jtLCm60z'
  );
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Cache-bust on every page load (in-browser Babel ignores ETags otherwise) -->
<script>window.__v = Date.now();</script>
<script>document.write([
  'tweaks-panel.jsx','data.jsx','api.jsx','components.jsx','ios-frame.jsx',
  'screens/Home.jsx','screens/Browse.jsx','screens/Scan.jsx','screens/Detail.jsx',
  'screens/Bulk.jsx','screens/Trade.jsx','screens/SettingsAndOnboarding.jsx',
  'Login.jsx','app.jsx',
].map(p => `<script type="text/babel" src="${p}?v=${window.__v}"></scr` + 'ipt>').join(''));</script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ResponsiveShell>
      <App/>
    </ResponsiveShell>
  );
</script>
</body>
</html>
