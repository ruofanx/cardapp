<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 28">
  <!-- CGC blue gradient background -->
  <defs>
    <linearGradient id="cgcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4F9B"/>
      <stop offset="100%" style="stop-color:#0D3275"/>
    </linearGradient>
  </defs>
  <rect width="72" height="28" fill="url(#cgcGrad)" rx="2"/>
  <!-- White arc accent (references CGC's circular logo element) -->
  <path d="M 58 4 A 12 12 0 0 1 58 24" fill="none" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <!-- CGC text -->
  <text x="32" y="20" text-anchor="middle" fill="white"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900" font-size="16" letter-spacing="2">CGC</text>
</svg>
